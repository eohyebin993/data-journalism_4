<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>서소문 재난문자 시군구별 발송 현황</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: 'Malgun Gothic', sans-serif; }
        #map { height: 100vh; width: 100%; }
        .info {
            padding: 10px 15px;
            font-size: 14px;
            background: white;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
            border-radius: 5px;
            line-height: 24px;
            color: #333;
        }
        .info h4 { margin: 0 0 5px; color: #007bff; }
        .legend {
            line-height: 18px;
            color: #555;
            background: white;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
        }
        .legend i {
            width: 18px;
            height: 18px;
            float: left;
            margin-right: 8px;
            opacity: 0.7;
        }
        .sigungu-label {
            display: none; /* 기본적으로 숨김 */
            background: transparent;
            border: none;
            color: #333;
            font-weight: bold;
            font-size: 10px;
            text-shadow: 0 0 3px white;
            box-shadow: none;
        }
        /* 특정 줌 레벨 이상일 때 라벨 표시 */
        .show-labels .sigungu-label {
            display: block;
        }
    </style>
</head>
<body>

<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // 1. 데이터 집계 결과 (seosomoon_disaster_alerts.json 분석 결과)
    const regionData = {"파주시": 17, "평택시": 14, "고양시덕양구": 15, "성동구": 18, "송파구": 18, "고양시일산동구": 15, "종로구": 18, "이천시": 14, "시흥시": 14, "노원구": 18, "성남시분당구": 14, "양주시": 14, "안산시단원구": 14, "과천시": 14, "연천군": 14, "오산시": 14, "광명시": 14, "관악구": 18, "동두천시": 14, "안산시상록구": 14, "화성시": 14, "수원시권선구": 14, "의왕시": 14, "안양시만안구": 14, "양천구": 18, "용인시처인구": 14, "양평군": 14, "은평구": 19, "구로구": 18, "남양주시": 14, "광주시": 14, "강서구": 18, "금천구": 18, "서초구": 18, "김포시": 14, "중랑구": 18, "아산시": 10, "수원시팔달구": 14, "가평군": 14, "의정부시": 14, "철원군": 10, "수원시영통구": 14, "중구": 19, "광진구": 18, "성북구": 18, "천안시서북구": 10, "도봉구": 18, "부천시": 14, "하남시": 14, "마포구": 18, "용인시기흥구": 14, "포천시": 14, "강동구": 18, "용인시수지구": 14, "동대문구": 18, "안성시": 14, "서대문구": 20, "동작구": 18, "성남시수정구": 14, "강북구": 18, "영등포구": 18, "용산구": 18, "군포시": 14, "고양시일산서구": 15, "성남시중원구": 14, "춘천시": 10, "수원시장안구": 14, "구리시": 14, "여주시": 14, "천안시동남구": 10, "강남구": 18, "안양시동안구": 14, "동구": 6, "남구": 6, "강화군": 6, "남동구": 6, "옹진군": 6, "계양구": 6, "부평구": 6, "연수구": 6, "서구": 6, "보은군": 1, "전주시덕진구": 1, "부안군": 1, "사하구": 1, "태백시": 1, "고흥군": 1, "화천군": 1, "음성군": 1, "해남군": 1, "함평군": 1, "영도구": 1, "목포시": 1, "울릉군": 1, "경주시": 1, "전주시완산구": 1, "당진시": 1, "여수시": 1, "청주시상당구": 1, "삼척시": 1, "울주군": 1, "곡성군": 1, "울진군": 1, "예산군": 1, "함안군": 1, "남해군": 1, "포항시남구": 1, "의령군": 1, "영천시": 1, "제천시": 1, "경산시": 1, "영월군": 1, "완주군": 1, "인제군": 1, "칠곡군": 1, "수영구": 1, "임실군": 1, "달서구": 1, "속초시": 1, "강릉시": 1, "산청군": 1, "장흥군": 1, "사천시": 1, "청도군": 1, "통영시": 1, "동해시": 1, "창원시성산구": 1, "금산군": 1, "원주시": 1, "화순군": 1, "진도군": 1, "상주시": 1, "세종시": 1, "금정구": 1, "청주시청원구": 1, "수성구": 1, "진안군": 1, "논산시": 1, "영광군": 1, "계룡시": 1, "포항시북구": 1, "무안군": 1, "공주시": 1, "충주시": 1, "평창군": 1, "양구군": 1, "동래구": 1, "유성구": 1, "창녕군": 1, "창원시의창구": 1, "제주시": 1, "부산진구": 1, "합천군": 1, "남원시": 1, "양양군": 1, "옥천군": 1, "괴산군": 1, "보령시": 1, "청송군": 1, "서천군": 1, "김해시": 1, "거제시": 1, "의성군": 1, "보성군": 1, "영암군": 1, "청주시흥덕구": 1, "영동군": 1, "익산시": 1, "군산시": 1, "진천군": 1, "고창군": 1, "장성군": 1, "문경시": 1, "횡성군": 1, "영덕군": 1, "고령군": 1, "창원시마산합포구": 1, "증평군": 1, "신안군": 1, "김천시": 1, "함양군": 1, "단양군": 1, "대구서구": 1, "부안군": 1};

    // 2. 지도 초기화 (사고 지점인 미근동 주변 중심)
    const map = L.map('map').setView([37.5642, 126.9673], 15);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>'
    }).addTo(map);

    // 최상단 레이어를 위한 Pane 생성
    map.createPane('topPane');
    map.getPane('topPane').style.zIndex = 650;

    // 사고 지점 마커 (미근동) - 좌표 핀 형태로 변경
    const incidentMarker = L.marker([37.5642, 126.9673], {
        pane: 'topPane'
    }).addTo(map);
    incidentMarker.bindPopup("<b>붕괴 사고 지점</b><br>서울특별시 서대문구 미근동").openPopup();

    // 지하철 노선 표시 - 경로 확장 및 파스텔 톤 적용
    const subways = [
        { name: "1호선", color: "#A9C9FF", coords: [[37.5546, 126.9706], [37.5657, 126.9769], [37.5702, 126.9831], [37.5716, 126.9918]] },
        { name: "2호선", color: "#B2FFB2", coords: [[37.5574, 126.9561], [37.5599, 126.9636], [37.5651, 126.9772], [37.5660, 126.9826], [37.5663, 126.9910]] },
        { name: "5호선", color: "#D1B2FF", coords: [[37.5537, 126.9567], [37.5599, 126.9636], [37.5657, 126.9666], [37.5752, 126.9768], [37.5716, 126.9918]] },
        { name: "경의중앙선", color: "#B2FFFF", coords: [[37.5546, 126.9706], [37.5598, 126.9636], [37.5601, 126.9458]] }
    ];

    subways.forEach(line => {
        L.polyline(line.coords, { 
            color: line.color, 
            weight: 12, 
            opacity: 0.9,
            pane: 'topPane'
        })
        .addTo(map)
        .bindTooltip(line.name, { sticky: true });
    });

    // 2.1 라벨 표시 제어 (줌 레벨 10 이상일 때 표시)
    map.on('zoomend', function() {
        if (map.getZoom() >= 10) {
            L.DomUtil.addClass(map.getContainer(), 'show-labels');
        } else {
            L.DomUtil.removeClass(map.getContainer(), 'show-labels');
        }
    });

    // 3. 색상 함수 (파란색 농도)
    function getColor(d) {
        return d > 15 ? '#084594' :
               d > 10 ? '#2171b5' :
               d > 5  ? '#4292c6' :
               d > 1  ? '#6baed6' :
               d > 0  ? '#9ecae1' :
                        '#f7fbff';
    }

    // 지역별 데이터를 가져오는 헬퍼 함수 (중구 필터링 포함)
    function getRegionValue(props) {
        if (!props) return 0;
        const name = props.name;
        const code = String(props.code || "");
        
        // '중구' 처리
        if (name === "중구") {
            if (code.startsWith("11")) return regionData["중구"] || 0; // 서울 중구 (19건)
            if (code.startsWith("23")) return 6; // 인천 중구 (6건으로 강제 지정)
            return 0;
        }
        
        return regionData[name] || 0;
    }

    // 4. 스타일 함수
    function style(feature) {
        const val = getRegionValue(feature.properties);
        return {
            fillColor: getColor(val),
            weight: 1,
            opacity: 1,
            color: 'white',
            dashArray: '3',
            fillOpacity: 0.7
        };
    }

    // 5. 상호작용 (Highlight)
    function highlightFeature(e) {
        const layer = e.target;
        layer.setStyle({
            weight: 3,
            color: '#666',
            dashArray: '',
            fillOpacity: 0.9
        });
        layer.bringToFront();
        info.update(layer.feature.properties);
    }

    let geojson;
    function resetHighlight(e) {
        geojson.resetStyle(e.target);
        info.update();
    }

    function onEachFeature(feature, layer) {
        const val = getRegionValue(feature.properties);
        
        layer.on({
            mouseover: highlightFeature,
            mouseout: resetHighlight,
            click: function(e) {
                map.fitBounds(e.target.getBounds());
            }
        });
        
        layer.bindPopup(`<b>${feature.properties.name}</b><br>재난문자 발송: ${val}건`);
        if (val > 10) {
            layer.bindTooltip(feature.properties.name, { 
                permanent: true, 
                direction: 'center', 
                className: 'sigungu-label' 
            });
        }
    }

    // 6. 정보창 추가
    const info = L.control();
    info.onAdd = function (map) {
        this._div = L.DomUtil.create('div', 'info');
        this.update();
        return this._div;
    };
    info.update = function (props) {
        const val = getRegionValue(props);
        this._div.innerHTML = '<h4>서소문 재난문자 시군구별 현황</h4>' +  (props ?
            '<b>' + props.name + '</b><br />' + val + ' 건'
            : '지역 위에 마우스를 올리세요');
    };
    info.addTo(map);

    // 7. 범례 추가
    const legend = L.control({position: 'bottomright'});
    legend.onAdd = function (map) {
        const div = L.DomUtil.create('div', 'info legend'),
            grades = [0, 1, 5, 10, 15],
            labels = [];

        div.innerHTML += '<b>발송 건수</b><br>';
        for (var i = 0; i < grades.length; i++) {
            div.innerHTML +=
                '<i style="background:' + getColor(grades[i] + 0.1) + '"></i> ' +
                grades[i] + (grades[i + 1] ? '&ndash;' + grades[i + 1] + '<br>' : '+');
        }
        return div;
    };
    legend.addTo(map);

    // 8. GeoJSON 불러오기 (수도권: 서울, 인천, 경기만 필터링)
    const GEOJSON_URL = 'https://cdn.jsdelivr.net/gh/southkorea/southkorea-maps@master/kostat/2018/json/skorea-municipalities-2018-geo.json';
    
    fetch(GEOJSON_URL)
        .then(res => res.json())
        .then(data => {
            geojson = L.geoJson(data, {
                style: style,
                onEachFeature: onEachFeature,
                filter: function(feature) {
                    const code = String(feature.properties.code || "");
                    // 11: 서울, 23: 인천, 31: 경기
                    return code.startsWith("11") || code.startsWith("23") || code.startsWith("31");
                }
            }).addTo(map);
        })
        .catch(err => console.error('GeoJSON 로딩 실패:', err));

</script>

</body>
</html>
