<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>재난문자 설문 결과</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

<style>
body {
    font-family: Arial, sans-serif;
}

.chart-container {
    width: 700px;
    height: 600px;
    margin: 30px auto;
}
</style>
</head>

<body>

<div class="chart-container">
    <canvas id="doughnutChart"></canvas>
</div>

<script>
const labels = [
    '모두 읽는다',
    '첫 문장만 읽는다',
    '읽지 않는다'
];

const values = [18, 60, 11];

const colors = [
    'rgba(59,130,246,0.6)',
    'rgba(239,68,68,0.6)',
    'rgba(245,158,11,0.6)'
];

// 전체 합계
const total = values.reduce((a, b) => a + b, 0);

new Chart(document.getElementById('doughnutChart'), {
    type: 'doughnut',

    data: {
        labels: labels,
        datasets: [{
            data: values,
            backgroundColor: colors,
            borderColor: 'white',
            borderWidth: 2
        }]
    },

    options: {
        responsive: true,

        plugins: {
            title: {
                display: true,
                text: '재난문자로 수신 받은 내용을 모두 읽습니까?',
                font: {
                    size: 20,
                    weight: 'bold'
                },
                padding: {
                    bottom: 30
                }
            },

            legend: {
                position: 'bottom'
            },

            tooltip: {
                callbacks: {
                    label: function(context) {
                        const value = context.raw;
                        const percent = ((value / total) * 100).toFixed(1);
                        return `${context.label}: ${value}명 (${percent}%)`;
                    }
                }
            }
        }
    }
});
</script>

</body>
</html>
